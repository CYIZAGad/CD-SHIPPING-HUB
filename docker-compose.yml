version: '3.8'

services:
  db:
    image: postgres:15
    container_name: cdshipping_db
    environment:
      POSTGRES_DB: cd_shipping_hubdb
      POSTGRES_USER: cd_shipping_hubdb_user
      POSTGRES_PASSWORD: postgres_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cd_shipping_hubdb_user -d cd_shipping_hubdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cdshipping_network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cdshipping_app
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: cd_shipping_hubdb
      DB_USER: cd_shipping_hubdb_user
      DB_PASS: postgres_password
      APP_ENV: development
      SITE_PROTOCOL: http
      SITE_DOMAIN: localhost:8000
      SITE_PATH: /
      INIT_DB: 1
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
      - php_session_data:/var/lib/php/sessions
    networks:
      - cdshipping_network

volumes:
  postgres_data:
  php_session_data:

networks:
  cdshipping_network:
    driver: bridge
